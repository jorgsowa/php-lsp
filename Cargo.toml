[package]
name = "php-lsp"
version = "0.1.53"
edition = "2024"
description = "A PHP Language Server Protocol implementation"
license = "MIT"
repository = "https://github.com/jorgsowa/php-lsp"
readme = "README.md"

[dependencies]
php-rs-parser = "0.6.2"
php-ast = "0.6.2"
bumpalo = { version = "3", features = ["collections"] }
tower-lsp = "0.20"
tokio = { version = "1", features = ["full"] }
serde_json = "1"
dashmap = "6"
mago-syntax = "1.19.0"
mago-linter = "1.19.0"
mago-semantics = "1.19.0"
mago-reporting = "1.19.0"
mago-names = "1.19.0"
mago-span = "1.19.0"
mago-php-version = "1.19.0"
mago-database = "1.19.0"

[dev-dependencies]
tempfile = "3"
expect-test = "1"
