[package]
name = "php-lsp"
version = "0.1.51"
edition = "2024"
description = "A PHP Language Server Protocol implementation"
license = "MIT"
repository = "https://github.com/jorgsowa/php-lsp"
readme = "README.md"

[dependencies]
mir-analyzer = "0.2.0"
mir-issues = "0.2.0"
mir-codebase = "0.2.0"
mir-types = "0.2.0"
php-rs-parser = "0.4.0"
php-ast = "0.4.0"
bumpalo = { version = "3", features = ["collections"] }
tower-lsp = "0.20"
tokio = { version = "1", features = ["full"] }
serde_json = "1"
dashmap = "6"

[dev-dependencies]
tempfile = "3"
expect-test = "1"
