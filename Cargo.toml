[package]
name = "php-lsp"
version = "0.1.1"
edition = "2024"
description = "A PHP Language Server Protocol implementation"
license = "MIT"
repository = "https://github.com/jorgsowa/php-lsp"
readme = "README.md"

[dependencies]
php-parser-rs = "0.1.3"
tower-lsp = "0.20"
tokio = { version = "1", features = ["full"] }
serde_json = "1"
dashmap = "6"
